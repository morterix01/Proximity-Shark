name: 🦈 Build ProximityShark APKs

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build-android:
    name: 📱 Android APK (Phone)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK (arm64 release)
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --build-name=1.1.0 \
            --build-number=9

      - name: Rename APK → ProximityShark_v1.1.0_android.apk
        run: |
          mkdir -p RELEASES/ProximityShark_v1.1.0
          cp build/app/outputs/flutter-apk/app-release.apk \
             RELEASES/ProximityShark_v1.1.0/ProximityShark_v1.1.0_android.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProximityShark_v1.1.0_android
          path: RELEASES/ProximityShark_v1.1.0/ProximityShark_v1.1.0_android.apk
          retention-days: 30

      # ── Auto-create GitHub Release on version tags ──────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: RELEASES/ProximityShark_v1.1.0/ProximityShark_v1.1.0_android.apk
          name: "🦈 Proximity Shark ${{ github.ref_name }}"
          body: |
            ## 🦈 Proximity Shark ${{ github.ref_name }} — Android

            ### Novità in questa release:
            - 🔴 **Panic Button** — nuova scheda con Ctrl+Alt+B via HID diretto
            - 💀 **Taskkill** — slide giù per killare tutti i processi utente (PowerShell stealth)
            - ⌚ **Ghiera Wear OS** — naviga tra le schede con la corona digitale
            - 🔗 **Win11 Stability Engine** — riconnessione robusta con backoff/jitter/HID reinit

            ### APK incluso:
            - `ProximityShark_v1.1.0_android.apk` — per telefono Android (arm64)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
