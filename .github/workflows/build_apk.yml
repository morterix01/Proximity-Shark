name: 🦈 Build ProximityShark APKs

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build-android:
    name: 📱 Android APK (Phone)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_wear_os_connectivity for AGP 8.0
        run: |
          PLUGIN_DIR="$HOME/.pub-cache/hosted/pub.dev/flutter_wear_os_connectivity-1.0.0/android/src/main"
          if [ -f "$PLUGIN_DIR/AndroidManifest.xml" ]; then
            sed -i 's/package="com.sstonn.flutter_wear_os_connectivity"//g' "$PLUGIN_DIR/AndroidManifest.xml"
            echo "Patched flutter_wear_os_connectivity AndroidManifest.xml"
          fi

      - name: Build Android APK (arm64 release)
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --build-name=1.0.8 \
            --build-number=8

      - name: Rename APK → Proximity-Shark-1.0.8 (android) v2.apk
        run: |
          mkdir -p RELEASES/Proximity-Shark-1.0.8
          cp build/app/outputs/flutter-apk/app-release.apk \
             RELEASES/Proximity-Shark-1.0.8/"Proximity-Shark-1.0.8 (android) v2.apk"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Proximity-Shark-1.0.8 (android) v2
          path: RELEASES/Proximity-Shark-1.0.8/*.apk
          retention-days: 30

      # ── Auto-create GitHub Release on version tags ──────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: RELEASES/Proximity-Shark-1.0.8/"Proximity-Shark-1.0.8 (android) v2.apk"
          name: "🦈 Proximity Shark ${{ github.ref_name }} — The Persistence & Stealth Update"
          body: |
            ## 🦈 Proximity Shark ${{ github.ref_name }} — The Persistence & Stealth Update

            ### 🚀 Novità in questa release (v1.0.8):
            - **🛡️ Stealth Shutdown**: Spegnimento forzato del PC via PowerShell in modalità nascosta.
            - **🔄 Infinite Loop Navigation**: Scorri all'infinito tra Panic, Taskkill e Shutdown.
            - **⚓ Win11 Stability**: Reset automatico del profilo HID per connessioni ultra-stabili.
            - **⌚ Sincronizzazione Totale**: Feedback real-time tra telefono e orologio durante il linking.
            - **🧹 UI/UX Cleanup**: Rimossi dispositivi sconosciuti e layout ridondanti.

            ### ⏪ Riepilogo v1.0.7:
            - Ottimizzazione 60 FPS per Wear OS.
            - Compressione GZIP per librerie script massive.
            - Fix crash "Duplicate Key" e ANR durante il parsing.

            ### APK incluso:
            - `Proximity-Shark-1.0.8 (android) v2.apk` — Build stabile per smartphone.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
