name: 🦈 Build ProximityShark APKs

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build-android:
    name: 📱 Android APK (Phone)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_wear_os_connectivity for AGP 8.0
        run: |
          # Robust path discovery
          PLUGIN_DIR=$(find $HOME/.pub-cache -name "flutter_wear_os_connectivity-1.0.0" -type d | head -n 1)
          if [ -n "$PLUGIN_DIR" ]; then
            MANIFEST_PATH="$PLUGIN_DIR/android/src/main/AndroidManifest.xml"
            if [ -f "$MANIFEST_PATH" ]; then
              sed -i 's/package="[^"]*"//g' "$MANIFEST_PATH"
              echo "Successfully patched $MANIFEST_PATH"
              cat "$MANIFEST_PATH" | head -n 5
            else
              echo "Manifest not found at $MANIFEST_PATH"
            fi
          else
            echo "Plugin directory not found"
          fi

      - name: Build Android APK (arm64 release)
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --build-name=2.0.0 \
            --build-number=10

      - name: Rename APK → Proximity-Shark-2.0.0 (android).apk
        run: |
          mkdir -p RELEASES/Proximity-Shark-2.0.0
          cp build/app/outputs/flutter-apk/app-release.apk \
             RELEASES/Proximity-Shark-2.0.0/"Proximity-Shark-2.0.0 (android).apk"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Proximity-Shark-2.0.0 (android)
          path: RELEASES/Proximity-Shark-2.0.0/*.apk
          retention-days: 30

      # ── Auto-create GitHub Release on version tags ──────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: RELEASES/Proximity-Shark-2.0.0/Proximity-Shark-2.0.0 (android).apk
          name: "🦈 Proximity Shark ${{ github.ref_name }} — Shark Chat (P2P)"
          body: |
            ## 🦈 Proximity Shark ${{ github.ref_name }} — Shark Chat (P2P)
            
            ### 🚀 Novità in questa release (v2.0.0):
            - **💬 Shark Chat P2P**: Nuova chat offline (Bluetooth + WiFi Direct).
            - **⌚ Integrazione WearOS**: Leggi e rispondi ai messaggi direttamente dall'orologio.
            - **⚡ Messaggi Veloci**: Risposte rapide preimpostate per la chat.
            - **🔗 Nearby Connections**: Rilevamento automatico e comunicazione mesh tra dispositivi vicini senza internet.

            ### APK incluso:
            - `Proximity-Shark-2.0.0 (android).apk` — Build stabile con Shark Chat.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
